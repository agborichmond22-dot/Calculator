<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
   </head>
   <body>

    <div id="calculator">
        <input id="display" readonly>
        <div id="keys">
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="0">0</button>
            <button class="operator-btn" data-value=".">.</button>
            <button class="operator-btn" data-action="clear">C</button>
            <button class="operator-btn" data-action="delete">⌫</button>
            <button class="operator-btn" data-action="calculate">=</button>
            <button class="operator-btn" data-value="+">+</button>
            <button class="operator-btn" data-value="-">-</button>
            <button class="operator-btn" data-value="*">X</button>
            <button class="operator-btn" data-value="/">/</button>
        </div>
    </div>
    <script src="calculator.js"></script>
   </body>
</html>
