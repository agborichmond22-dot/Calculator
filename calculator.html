<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>    
    <link rel="stylesheet" href="calculator.css">
   </head>
   <body>
    
    <div id="calculator">
        <input id="display" readonly aria-live="polite" aria-label="Calculator display">
        <div id="keys">
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')" class="operator-btn" aria-label="decimal point">.</button>
            <button onclick="clearDisplay()" class="operator-btn" aria-label="Clear">C</button>
            <button onclick="deleteLast()" class="operator-btn" aria-label="Backspace">⌫</button>
            <button onclick="calculate()" class="operator-btn" aria-label="Equals">=</button>
            <button onclick="appendToDisplay('+')" class="operator-btn" aria-label="Plus">+</button>
            <button onclick="appendToDisplay('-')" class="operator-btn" aria-label="Minus">-</button>
            <button onclick="appendToDisplay('*')" class="operator-btn" aria-label="Multiply">X</button>
            <button onclick="appendToDisplay('/')" class="operator-btn" aria-label="Divide">/</button>
        </div>
    </div>
    <script src="calculator.js"></script>
   </body>
